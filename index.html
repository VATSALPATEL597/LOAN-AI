<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- 🔐 Login Section -->
    <div id="loginBox" class="card">
        <h2>Login 🔐</h2>
        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="loginMsg"></p>
    </div>

    <!-- 💰 Main App -->
    <div id="appBox" class="card" style="display:none;">
        <h1>💰 Loan Approval System</h1>

        <input id="income" placeholder="Enter Income"><br>
        <input id="creditScore" placeholder="Credit Score"><br>
        <input id="loanAmount" placeholder="Loan Amount"><br>

        <button onclick="checkLoan()">Check Loan</button>

        <h2 id="result"></h2>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
